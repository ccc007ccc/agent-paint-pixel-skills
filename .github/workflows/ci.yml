name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Check skill mirror
        run: sh ./scripts/sync-skill-mirror.sh --check

      - name: Check skill size
        run: |
          size="$(wc -c < .agents/skills/agent-paint-pixel-skills/SKILL.md)"
          test "$size" -lt 12000 || {
            echo "SKILL.md is ${size} bytes; move conditional detail into references/"
            exit 1
          }

      - name: Check style references
        run: |
          set -eu
          root=".agents/skills/agent-paint-pixel-skills/references"
          refs="$(mktemp)"
          grep -ho 'styles/[^`]*\.md' "$root/pixel-art-style-guide.md" | sort -u > "$refs"
          missing=0
          while IFS= read -r ref; do
            if [ ! -f "$root/$ref" ]; then
              echo "Missing style reference: $ref"
              missing=1
            fi
          done < "$refs"
          rm -f "$refs"
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Check large canvas reference
        run: test -f .agents/skills/agent-paint-pixel-skills/references/large-canvas.md

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test
