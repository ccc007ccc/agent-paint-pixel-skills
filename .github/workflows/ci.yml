name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Check skill mirror
        run: sh ./scripts/sync-skill-mirror.sh --check

      - name: Check style references
        run: |
          set -eu
          root=".agents/skills/agent-paint-pixel-skills/references"
          grep -ho 'styles/[^`]*\.md' "$root/pixel-art-style-guide.md" | sort -u | while read -r ref; do
            test -f "$root/$ref"
          done

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test
